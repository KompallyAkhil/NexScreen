# fly.toml — Fly.io deployment config for NexScreen backend
# Generated for free tier (shared-cpu-1x, 256MB RAM)

app = "nexscreen-backend"
primary_region = "mad"        # Madrid — closest free-tier region to India available

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = true   # Stop machine when idle (saves free allowance)
  auto_start_machines = true   # Auto-start on incoming request
  min_machines_running = 0     # Allow scaling to zero on free tier

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 100
    hard_limit = 200

[[vm]]
  size   = "shared-cpu-1x"    # Free tier machine size
  memory = "512mb"

[checks]
  [checks.health]
    grace_period = "60s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    port         = 8000
    timeout      = "10s"
    type         = "http"
