services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexscreen-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    # Override command to ensure host is accessible externally
    command: uvicorn run:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexscreen-frontend
    ports:
      - "3000:3000"
    volumes:
      # Mount the frontend directory so changes hot-reload
      - ./frontend:/app
      # Create anonymous volumes so it doesn't overwrite container's node_modules/.next 
      # with host's potentially incomplete/platform-specific ones
      - /app/node_modules
      - /app/.next
    environment:
      # Use polling to ensure Next.js detects changes inside Docker
      - WATCHPACK_POLLING=true
    command: npm run dev
    depends_on:
      - backend
